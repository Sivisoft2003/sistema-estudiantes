

<!DOCTYPE html>
<html>
<head>
    <title>Bienvenida mi amor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 300px;">
    <h3 class="text-center">Login</h3>

    <input type="text" id="username" class="form-control mb-2" placeholder="Usuario">
    <input type="password" id="password" class="form-control mb-3" placeholder="Contraseña">

    <button onclick="login()" class="btn btn-primary w-100">Ingresar</button>
</div>

<script>
function login() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    fetch("http://localhost:3000/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
    localStorage.setItem("logueado", "true");
    window.location.href = "index.html";
        }
    });
}
</script>

</body>
</html>
