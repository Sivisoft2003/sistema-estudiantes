<!DOCTYPE html>
<html>
<head>
    <title>Sistema de mi amor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Sistema de Estudiantes pRUEBA</h1>

    <div class="card p-4 shadow mb-4">
        <h4>Registrar / Editar</h4>

        <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre">
        <input type="number" id="edad" class="form-control mb-2" placeholder="Edad">
        <input type="text" id="carrera" class="form-control mb-2" placeholder="Carrera">
        <select id="genero" class="form-control mb-2">
        <option value="">Seleccione Género</option>
        <option value="Masculino">Masculino</option>
        <option value="Femenino">Femenino</option>
        <option value="Otro">Otro</option>
        </select>

        <button onclick="guardar()" class="btn btn-primary">Guardar</button>
        <button onclick="logout()" class="btn btn-danger mb-3">Cerrar sesión</button>
    </div>

    <div class="card p-4 shadow">
        <h4>Lista de Estudiantes</h4>
        <input type="text" id="buscador" class="form-control mb-3" placeholder="Buscar estudiante..." onkeyup="listar()">
        <ul id="lista" class="list-group"></ul>
    </div>

</div>

</body>

<script>
    if (localStorage.getItem("logueado") !== "true") {
    window.location.href = "login.html";
}
    let editandoId = null;
function guardar() {
    const nombre = document.getElementById("nombre").value;
    const edad = document.getElementById("edad").value;
    const carrera = document.getElementById("carrera").value;
    const genero = document.getElementById("genero").value;
    if (!genero) return alert("Por favor, selecciona un género");

    if (editandoId) {
        // EDITAR
        fetch(`/estudiantes/${editandoId}`, {
            method: "PUT",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ nombre, edad, carrera,genero})
        })
        .then(() => {
            editandoId = null;
            limpiar();
            listar();
        });
    } else {
        // CREAR
        fetch("/estudiantes", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ nombre, edad, carrera, genero })
        })
        .then(() => {
            limpiar();
            listar();
        });
    }
}
function editar(est) {
    document.getElementById("nombre").value = est.nombre;
    document.getElementById("edad").value = est.edad;
    document.getElementById("carrera").value = est.carrera;
    document.getElementById("genero").value = est.genero;
    editandoId = est.id;
}
function limpiar() {
    document.getElementById("nombre").value = "";
    document.getElementById("edad").value = "";
    document.getElementById("carrera").value = "";
    document.getElementById("genero").value ="";
}

function listar() {
    fetch("/estudiantes")
    .then(res => res.json())
    .then(data => {

        const lista = document.getElementById("lista");
        const filtro = document.getElementById("buscador").value.toLowerCase();

        lista.innerHTML = "";

        data.forEach(est => {
            if (
                est.nombre.toLowerCase().includes(filtro) ||
                est.carrera.toLowerCase().includes(filtro)
            ) {

                const li = document.createElement("li");

                li.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <strong>${est.nombre}</strong> - ${est.carrera} (${est.edad} años) (${est.genero})
                        </div>
                        <div>
                            <button class="btn btn-warning btn-sm" onclick='editar(${JSON.stringify(est)})'>✏️</button>
                            <button class="btn btn-danger btn-sm" onclick="eliminar(${est.id})">❌</button>
                        </div>
                    </div>
                `;

                li.classList.add("list-group-item");
                lista.appendChild(li);
            }
        });
    });
}

// Cargar al inicio
listar();
function eliminar(id) {
    fetch(`/estudiantes/${id}`, {
        method: "DELETE"
    })
    .then(() => {
        listar();
    });
}
function logout() {
    localStorage.removeItem("logueado");
    window.location.href = "login.html";
}
</script>
</html>
